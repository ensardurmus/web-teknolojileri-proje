<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İlgi Alanlarım | Kişisel Web Sitem</title>
    <link rel="stylesheet" href="indexStil.css">
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <style>
        body {
            background-color: #f8f9fa;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        .movie-card img {
            height: 400px;
            object-fit: cover;
        }
    </style>
</head>
<body>
    
    <!-- Üst Menü -->
    <header class="bg-white shadow-sm py-3 mb-5">
        <div class="container d-flex flex-wrap justify-content-between align-items-center">
            <h1 class="h4 mb-0 text-dark fw-bold">Muhammet Ensar Durmuş</h1>
            <nav class="nav nav-pills">
                <a class="nav-link text-secondary" href="index.html">Hakkında</a>
                <a class="nav-link text-secondary" href="cv.html">Özgeçmiş</a>
                <a class="nav-link text-secondary" href="sehrim.html">Şehrim</a>
                <a class="nav-link text-secondary" href="takimimiz.html">Takımımız</a>
                <a class="nav-link active bg-dark text-white" href="ilgialanlarim.html">İlgi Alanlarım</a>
            </nav>
        </div>
    </header>

    <main class="container mb-5 flex-grow-1">
        <div class="row justify-content-center">
            <div class="col-lg-10">
                
                <!-- API Başlık ve Arama Alanı -->
                <section class="mb-5 text-center p-4 bg-white rounded-3 shadow-sm border-top border-4 border-dark">
                    <h2 class="fw-bold mb-3">Film ve Dizi Arama Motoru</h2>
                    <p class="text-secondary mb-4">Ücretsiz API kullanılarak anlık veri çekilmektedir. İstediğiniz dizi veya filmi aratabilirsiniz.</p>
                    
                    <div class="input-group mb-3 w-75 mx-auto">
                        <input type="text" id="searchInput" class="form-control form-control-lg" placeholder="Örn: Stranger Things, How I Met Your Mother..." aria-label="Film Ara">
                        <button class="btn btn-dark px-4" type="button" id="searchBtn">Ara</button>
                    </div>
                </section>

                <!-- API'den Gelen Sonuçların Listeleneceği Alan -->
                <div id="results" class="row g-4">
                    <!-- JavaScript ile çekilen veriler buraya eklenecek -->
                </div>

            </div>
        </div>
    </main>

    <footer class="bg-white border-top py-4 mt-auto">
        <div class="container text-center">
            <p class="text-muted small mb-0">G231210064 - Web Teknolojileri Proje Ödevi</p>
        </div>
    </footer>

    <!-- Bootstrap JS -->
    <script src="js/bootstrap.bundle.min.js"></script>

    <!-- API Fetch İşlemleri -->
    <script>
        document.getElementById('searchBtn').addEventListener('click', function() {
            const query = document.getElementById('searchInput').value;
            const resultsDiv = document.getElementById('results');
            
            // Eğer boş arama yapılırsa
            if(query.trim() === '') {
                resultsDiv.innerHTML = '<div class="col-12 text-center text-danger"><p>Lütfen bir film veya dizi adı girin.</p></div>';
                return;
            }

            // Yükleniyor mesajı
            resultsDiv.innerHTML = '<div class="col-12 text-center"><div class="spinner-border text-dark" role="status"></div><p class="mt-2">Veriler çekiliyor...</p></div>';

            // TVMaze API'sine Fetch isteği atıyoruz
            fetch(`https://api.tvmaze.com/search/shows?q=${query}`)
                .then(response => response.json())
                .then(data => {
                    resultsDiv.innerHTML = ''; // Önceki sonuçları temizle
                    
                    if(data.length === 0) {
                        resultsDiv.innerHTML = '<div class="col-12 text-center text-muted"><p>Aradığınız kriterlere uygun sonuç bulunamadı.</p></div>';
                        return;
                    }

                    // Gelen her bir sonuç için Bootstrap Kartı oluştur
                    data.forEach(item => {
                        const show = item.show;
                        const imageUrl = show.image ? show.image.medium : 'https://via.placeholder.com/210x295?text=Gorsel+Yok';
                        const summary = show.summary ? show.summary.substring(0, 100) + '...' : 'Açıklama bulunmuyor.';
                        const rating = show.rating.average ? show.rating.average : 'Bilinmiyor';

                        const cardHTML = `
                            <div class="col-md-4">
                                <div class="card border-0 shadow-sm rounded-3 h-100 movie-card">
                                    <img src="${imageUrl}" class="card-img-top" alt="${show.name}">
                                    <div class="card-body d-flex flex-column">
                                        <h5 class="card-title fw-bold">${show.name}</h5>
                                        <p class="text-warning fw-bold mb-2">⭐ ${rating}</p>
                                        <p class="card-text text-secondary small flex-grow-1">${summary}</p>
                                        <span class="badge bg-secondary mt-auto align-self-start">${show.language || 'Bilinmiyor'} / ${show.premiered ? show.premiered.substring(0,4) : '-'}</span>
                                    </div>
                                </div>
                            </div>
                        `;
                        resultsDiv.innerHTML += cardHTML;
                    });
                })
                .catch(error => {
                    resultsDiv.innerHTML = '<div class="col-12 text-center text-danger"><p>Veri çekilirken bir hata oluştu.</p></div>';
                    console.error('Hata:', error);
                });
        });

        // Enter tuşu ile de arama yapabilmek için
        document.getElementById('searchInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                document.getElementById('searchBtn').click();
            }
        });
    </script>
</body>
</html>
